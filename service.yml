name: dagster
icon: dagster
title: Dagster
type: service

endpoints:
- name: web
  workload: webserver
  ports:
  - name: http
    main: true
    number: 80
    protocol: http

options:
- version: '1'
  tag: '1.12.13'
  default: true

helm:
  name: dagster
  source: https://dagster-io.github.io/helm
  chart: dagster/dagster
  version: 1.12.13
  values:
    # Expose Wodby endpoint on the Dagster webserver service.
  - name: dagsterWebserver.service.port
    value: 80

    # Keep daemon enabled by default; users can switch it off if they only want the UI.
  - name: dagsterDaemon.enabled
    value: true

    # Disable bundled Postgres by default if you want users to connect an external DB service.
    # Remove this if you want the upstream chart to provision Postgres automatically.
  - name: postgresql.enabled
    value: false
  - name: postgresql.postgresqlHost
    value: "{{links.postgres.database.host}}"
  - name: postgresql.postgresqlUsername
    value: "{{links.postgres.database.user.name}}"
  - name: postgresql.postgresqlDatabase
    value: "{{links.postgres.database.db.name}}"
  - name: postgresql.postgresqlPassword
    value: "{{links.postgres.database.user.password}}"

    # Reasonable defaults for a single-service Wodby setup.
  - name: runLauncher.type
    value: K8sRunLauncher
  - name: dagsterDaemon.runCoordinator.enabled
    value: true
  - name: dagsterDaemon.runCoordinator.type
    value: QueuedRunCoordinator

  - name: dagster-user-deployments.enabled
    value: true
  - name: dagster-user-deployments.enableSubchart
    value: false
  - name: dagster-user-deployments.deployments
    value: []

  - name: dagsterWebserver.workspace.enabled
    value: true
  - name: dagsterWebserver.workspace.servers
    value: []
  - name: dagsterWebserver.workspace.externalConfigmap
    value: "{{configs.workspace.configMap}}"

links:
- name: postgres
  title: PostgreSQL
  required: true
  selectors:
  - type: db
    labels:
    - postgres

configs:
- name: workspace
  title: Workspace
  filename: workspace.yaml
  config: workspace.yaml

tokens:
- name: dagster-secret
  generate:
    regex: '[A-Za-z0-9]{64}'

actions:
- name: wipe-pending-runs
  title: Wipe pending runs
  type: button
  args:
  - dagster
  - run
  - wipe
  - --force

workloads:
- name: webserver
  selector:
    matchLabels:
      app.kubernetes.io/instance: '{{service.helm.release}}'
      component: dagster-webserver
  kind: deployment
  primary: true
  helm:
    annotations: dagsterWebserver.annotations
    labels: dagsterWebserver.labels
    volumes: dagsterWebserver.volumes
    sidecars: dagsterWebserver.extraContainers
  containers:
  - name: dagster
    image: dagster/dagster-celery-k8s
    helm:
      resources: dagsterWebserver.resources
      env: dagsterWebserver.env
      mounts: dagsterWebserver.volumeMounts
      image:
        repository: dagsterWebserver.image.repository
        tag: dagsterWebserver.image.tag
        # Dagster expects repository to contain the full image path, so empty
        # registry disables separate registry injection in Wodby.
        registry: ''
        pullPolicy: dagsterWebserver.image.pullPolicy
- name: daemon
  selector:
    matchLabels:
      app.kubernetes.io/instance: '{{service.helm.release}}'
      component: dagster-daemon
  kind: deployment
  helm:
    annotations: dagsterDaemon.annotations
    labels: dagsterDaemon.labels
    volumes: dagsterDaemon.volumes
    sidecars: dagsterDaemon.extraContainers
  containers:
  - name: dagster
    image: dagster/dagster-celery-k8s
    helm:
      resources: dagsterDaemon.resources
      env: dagsterDaemon.env
      mounts: dagsterDaemon.volumeMounts
      image:
        repository: dagsterDaemon.image.repository
        tag: dagsterDaemon.image.tag
        # Dagster expects repository to contain the full image path, so empty
        # registry disables separate registry injection in Wodby.
        registry: ''
        pullPolicy: dagsterDaemon.image.pullPolicy
